<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Places Disponibles</title>
</head>
<body>
    <div class="page-container">
        <!-- Bouton utilisateur en haut à droite -->
        <div class="user-dropdown" style="position: absolute; top: 10px; right: 20px;">
            <button>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                    <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                </svg>
                Utilisateur
            </button>
            <div class="dropdown-content" style="position: absolute; right: 0; background: #f1f1f1; padding: 10px; border: 1px solid #ddd;">
                <div class="user-info">
                    {{ session['username'].split('@')[0] }} <!-- Affiche le prénom ou partie avant "@" -->
                </div>
                <a href="/logout" style="text-decoration: none; color: #007bff;">Se déconnecter</a>
            </div>
        </div>

        <!-- En-tête -->
        <header class="header">
            <h1>Places Disponibles</h1>
        </header>

        <!-- Contenu principal -->
        <main class="main-content">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Zone</th>
                        <th>Type</th>
                        <th>Statut</th> <!-- Modification ici -->
                    </tr>
                </thead>
                <tbody>
                    {% for slot in slots %}
                    <tr>
                        <td>{{ slot[0] }}</td> <!-- ID de la place (parking_id) -->
                        <td>{{ slot[1] }}</td> <!-- Zone -->
                        <td>{{ slot[2] }}</td> <!-- Type de zone -->
                        <td>{{ 'Réservé' if slot[3] == 1 else 'Disponible' }}</td> <!-- Statut -->
                    </tr>
                    {% endfor %}
                </tbody>                
                         
            </table>
        </main>

        <!-- Pied de page -->
        <footer class="footer">
            <a href="/reserve" class="btn">Réserver une place</a>
            <a href="/reservations" class="btn">Mes Réservations</a>
        </footer>
    </div>
</body>
</html>
